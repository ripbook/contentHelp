<style>
:root {
    --primary-color: #1e293b;
    --accent-color: #3b82f6;
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --text-color: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: #334155;
}
body {
    font-family: 'Poppins', 'Mukta Malar', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0; padding: 20px;
    display: flex; justify-content: center;
}
.container { max-width: 1200px; width: 100%; position: relative; }
.logo-container { text-align: center; margin-bottom: 10px; }
.main-logo { max-width: 60px; height: auto; filter: drop-shadow(0 0 10px rgba(59,130,246,0.5)); }
.header { text-align: center; margin-bottom: 30px; }
.header h1 {
    color: #fff; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 10px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
	font-size: clamp(24px, 5vw, 28px);
}
.header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }
.back-btn {
    position: absolute; top: 0; right: 0;
    background-color: #334155; color: white; padding: 10px 20px;
    border-radius: 8px; text-decoration: none; font-size: 14px;
    font-weight: 600; display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border-color); transition: 0.3s;
}
.back-btn:hover { background-color: var(--accent-color); transform: translateY(-2px); }
.editor-body {
    background: var(--card-bg); border-radius: 16px; padding: 30px;
    border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    display: flex; gap: 40px; align-items: flex-start; justify-content: center; flex-wrap: wrap;
}
.crop-canvas-area { background: #000; line-height: 0; border: 2px solid var(--border-color); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.input-group { display: flex; flex-direction: column; gap: 5px; background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); }
.input-group label { font-size: 11px; color: #63b3ed; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 5px; }
.wm-toggle-bar { display: flex; gap: 10px; margin-top: 10px; }
.wm-opt {
    flex: 1; padding: 10px; border: 1px solid var(--border-color);
    background: #1e293b; color: #fff; cursor: pointer; border-radius: 8px;
    font-weight: 600; font-family: 'Poppins', sans-serif; font-size: 13px; transition: 0.2s;
}
.wm-opt.active { background: var(--accent-color); border-color: var(--accent-color); }
.btn {
    background-color: var(--accent-color); color: white; border: none;
    padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: 0.3s; width: 100%; margin-top: 10px;
    font-family: 'Poppins', 'Mukta Malar', sans-serif; font-size: 14px;
}
.btn:hover { filter: brightness(1.2); }
.controls-col { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 15px; }

/* ── Sidebar Layout ── */
.app-shell { display: flex; min-height: 100vh; }
.sidebar {
    width: 220px; min-width: 220px;
    background: #111827;
    border-right: 1px solid #1e293b;
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0;
    height: 100vh; z-index: 1000;
    overflow-y: auto; transition: transform 0.3s ease;
}
.sidebar-logo {
    padding: 22px 18px 16px;
    border-bottom: 1px solid #1e293b;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
}
.sidebar-logo img { width: 42px; filter: drop-shadow(0 0 8px rgba(59,130,246,0.5)); }
.sidebar-logo span { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; color: #3b82f6; text-transform: uppercase; }
.sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 4px; }
.sidebar-nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    text-decoration: none; color: #94a3b8;
    font-size: 0.8rem; font-weight: 600;
    transition: all 0.2s ease; border: 1px solid transparent;
    font-family: 'Poppins', sans-serif;
}
.sidebar-nav a i { width: 16px; text-align: center; font-size: 0.85rem; flex-shrink: 0; }
.sidebar-nav a:hover { background: #1e293b; color: #f8fafc; border-color: #334155; }
.sidebar-nav a.active { background: rgba(59,130,246,0.15); color: #3b82f6; border-color: rgba(59,130,246,0.3); }
.sidebar-nav a.active i { color: #3b82f6; }
.sidebar-divider { height: 1px; background: #1e293b; margin: 8px 10px; }
.sidebar-section-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #475569; padding: 6px 12px 4px; }
.sidebar-toggle {
    display: none; position: fixed; top: 14px; left: 14px;
    z-index: 1100; background: #1e293b; border: 1px solid #334155;
    color: #fff; width: 40px; height: 40px; border-radius: 10px;
    cursor: pointer; align-items: center; justify-content: center; font-size: 16px;
}
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; }
.main-content { margin-left: 220px; flex: 1; min-width: 0; padding: 20px; box-sizing: border-box; }
@media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: flex; }
    .sidebar-overlay.open { display: block; }
    .main-content { margin-left: 0; padding: 20px 15px; padding-top: 65px; }
}
body { margin: 0; }
.back-btn { display: none !important; }
</style>
</head>

    <main class="main-content">

<div class="container">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="logo-container">
        <img src="https://ripbook.github.io/contentHelp/ripbook_logo.png" alt="RIPBOOK Logo" class="main-logo">
    </div>
    <div class="header">
        <h1>Photo Crop &amp; Watermark </h1>
        <p> RMC Memorial page (246x266)</p>
    </div>

    <div class="editor-body">
        <div>
            <div class="crop-canvas-area">
                <canvas id="cropCanvas" width="246" height="266"></canvas>
            </div>
            <button class="btn" style="background:#27ae60; padding:16px; font-size:15px; margin-top:20px;" onclick="saveBothFiles()">
                <i class="fas fa-download"></i> SAVE BOTH VERSIONS
            </button>
        </div>

        <div class="controls-col">
            <div class="input-group">
                <label>1. Select Image</label>
                <button class="btn" style="background:#3b82f6;" onclick="document.getElementById('crop-upload').click()">
                    <i class="fas fa-image"></i> Choose File
                </button>
                <input type="file" id="crop-upload" accept="image/*" style="display:none;">
            </div>

            <div class="input-group">
                <label>2. Image Zoom</label>
                <input type="range" id="zoomSlider" style="width:100%; margin-top:5px; accent-color:#3b82f6;" min="0.1" max="4" step="0.01" value="1">
            </div>

            <div class="input-group">
                <label>3. The background is already removed. Click Original to keep it, or click Remove BG to remove the background.</label>
                <div class="wm-toggle-bar">
                    <button class="wm-opt active" id="modeOriginal" onclick="handleOriginal()">Original</button>
                    <button class="wm-opt" id="modeRemoveBG" onclick="processRemoveBG()">Remove BG</button>
                </div>
                <div id="bgColorControls" style="display:none;" class="wm-toggle-bar">
                    <button id="btnBgWhite" class="wm-opt" onclick="changeBg('#ffffff','btnBgWhite')" style="background:white;color:black;">White BG</button>
                    <button id="btnBgGrey" class="wm-opt" onclick="changeBg('#808080','btnBgGrey')" style="background:#808080;color:white;">Grey BG</button>
                </div>
            </div>

            <div class="input-group">
                <label>4. Add RIPBOOK Logo</label>
                <div class="wm-toggle-bar">
                    <button id="btnWhiteLogo" class="wm-opt" onclick="addWM(logoWhite,'btnWhiteLogo')">White Logo</button>
                    <button id="btnGreyLogo" class="wm-opt active" onclick="addWM(logoGrey,'btnGreyLogo')">Grey Logo</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
// --- API Keys with automatic fallback ---
const API_KEYS = [
    'XdB7u1sGb9XGEmRfxfpwErsH',
    'GPp5FSkU3gBmGeQEqRmnKrXm',
    'nAboLB176zWT7KenDcmd8Yne'
];

const cropCanvas = new fabric.Canvas('cropCanvas', { preserveObjectStacking: true });
const logoGrey  = 'https://eaglenithu.github.io/ripbookcontenthelp/RIP_Watermark1.png';
const logoWhite = 'https://eaglenithu.github.io/ripbookcontenthelp/RIP_Watermark2.png';
let uploadedCropImg = null, activeWM = null, baseScale = 1;

document.getElementById('crop-upload').onchange = function(e) {
    const r = new FileReader();
    r.onload = ev => { fabric.Image.fromURL(ev.target.result, img => setupCropImage(img)); };
    r.readAsDataURL(e.target.files[0]);
};

function setupCropImage(img) {
    if (uploadedCropImg) cropCanvas.remove(uploadedCropImg);
    baseScale = 246 / img.width;
    img.set({ originX: 'center', originY: 'center', centeredScaling: true });
    img.scale(baseScale);
    cropCanvas.add(img);
    img.set({ left: cropCanvas.width / 2, top: cropCanvas.height / 2 });
    img.sendToBack();
    cropCanvas.setActiveObject(img);
    uploadedCropImg = img;
    if (activeWM) activeWM.bringToFront();
    document.getElementById('zoomSlider').value = 1;
    cropCanvas.renderAll();
}

document.getElementById('zoomSlider').oninput = function() {
    if (!uploadedCropImg) return;
    uploadedCropImg.scale(baseScale * parseFloat(this.value));
    uploadedCropImg.set({ left: cropCanvas.width / 2, top: cropCanvas.height / 2 });
    cropCanvas.renderAll();
};

function handleOriginal() {
    document.getElementById('modeOriginal').classList.add('active');
    document.getElementById('modeRemoveBG').classList.remove('active');
    document.getElementById('bgColorControls').style.display = 'none';
    document.getElementById('btnBgWhite').classList.remove('active');
    document.getElementById('btnBgGrey').classList.remove('active');
    cropCanvas.setBackgroundColor(null, cropCanvas.renderAll.bind(cropCanvas));
}

// Tries each API key in order until one succeeds
async function tryRemoveBG(file, keyIndex) {
    if (keyIndex >= API_KEYS.length) {
        throw new Error('All API keys exhausted. Please try again later.');
    }
    const formData = new FormData();
    formData.append('image_file', file);
    formData.append('size', 'auto');

    const response = await fetch('https://api.remove.bg/v1.0/removebg', {
        method: 'POST',
        headers: { 'X-Api-Key': API_KEYS[keyIndex] },
        body: formData
    });

    if (response.ok) {
        return await response.blob();
    }

    const errData = await response.json().catch(() => ({}));
    const errMsg = (errData.errors && errData.errors[0] && errData.errors[0].title) || response.statusText;

    // If this key hit a limit or auth error, try the next key
    if (response.status === 402 || response.status === 403 || response.status === 429) {
        console.warn(`API key ${keyIndex + 1} failed (${errMsg}), trying next key...`);
        return await tryRemoveBG(file, keyIndex + 1);
    }

    // For other errors, throw immediately
    throw new Error(errMsg);
}

async function processRemoveBG() {
    const fileInput = document.getElementById('crop-upload');
    if (!fileInput.files[0]) {
        Swal.fire({ icon: 'warning', title: 'Upload Photo', text: 'Please select a photo first.', background: '#1e293b', color: '#fff' });
        return;
    }
    document.getElementById('modeRemoveBG').classList.add('active');
    document.getElementById('modeOriginal').classList.remove('active');

    Swal.fire({
        title: 'Removing Background',
        html: `<div style="margin-top:20px;">
                 <i class="fas fa-spinner fa-spin fa-3x" style="color:#3b82f6;"></i>
                 <p style="margin-top:20px;color:#94a3b8;">BG remover is processing...<br>Please wait.</p>
               </div>`,
        allowOutsideClick: false,
        showConfirmButton: false,
        background: '#1e293b',
        color: '#fff'
    });

    try {
        const blob = await tryRemoveBG(fileInput.files[0], 0);
        fabric.Image.fromURL(URL.createObjectURL(blob), img => {
            setupCropImage(img);
            document.getElementById('bgColorControls').style.display = 'flex';
            Swal.close();
            Swal.fire({ icon: 'success', title: 'Background Removed', timer: 1500, showConfirmButton: false, background: '#1e293b', color: '#fff' });
        });
    } catch (err) {
        Swal.fire({ icon: 'error', title: 'Process Failed', text: err.message, background: '#1e293b', color: '#fff' });
    }
}

function changeBg(color, id) {
    document.getElementById('btnBgWhite').classList.remove('active');
    document.getElementById('btnBgGrey').classList.remove('active');
    document.getElementById(id).classList.add('active');
    cropCanvas.setBackgroundColor(color, cropCanvas.renderAll.bind(cropCanvas));
}

function addWM(url, id) {
    if (!uploadedCropImg) return;
    document.getElementById('btnWhiteLogo').classList.remove('active');
    document.getElementById('btnGreyLogo').classList.remove('active');
    document.getElementById(id).classList.add('active');
    fabric.Image.fromURL(url, img => {
        if (activeWM) cropCanvas.remove(activeWM);
        img.scale(0.038);
        img.set({ left: 45, top: 135 });
        cropCanvas.add(img);
        img.bringToFront();
        activeWM = img;
        cropCanvas.renderAll();
    }, { crossOrigin: 'anonymous' });
}

function saveBothFiles() {
    if (!uploadedCropImg) return;
    cropCanvas.discardActiveObject().renderAll();
    const a = document.createElement('a');
    a.download = 'ripbook_watermarked.png';
    a.href = cropCanvas.toDataURL({ format: 'png' });
    a.click();
    if (activeWM) {
        activeWM.set({ opacity: 0 });
        cropCanvas.renderAll();
        setTimeout(() => {
            a.download = 'ripbook_clean.png';
            a.href = cropCanvas.toDataURL({ format: 'png' });
            a.click();
            activeWM.set({ opacity: 1 });
            cropCanvas.renderAll();
            Swal.fire({ icon: 'success', title: 'Saved!', background: '#1e293b', color: '#fff', timer: 1000, showConfirmButton: false });
        }, 500);
    }
}
</script>

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');

    document.getElementById('sidebarOverlay').classList.remove('open');
}
</script>
